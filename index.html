<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raindrop Race</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { background: #b8c3cd; transition: background 1.2s ease; }
  body.night { background: #12151f; }

  #app { position: fixed; inset: 0; overflow: hidden; }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .page { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; pointer-events: none; }
  .page.active { display: flex; }
  .page > * { pointer-events: auto; }

  .card {
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 32px 36px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 6px 24px rgba(40, 50, 60, 0.1);
  }

  .title {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 34px;
    font-weight: 500;
    color: #2a3540;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .tag {
    font-size: 15px;
    color: #5a6570;
    margin-bottom: 26px;
    line-height: 1.6;
    font-style: italic;
  }

  .btn {
    background: #2a3540;
    color: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:hover { background: #1a2530; }
  .btn:active { transform: scale(0.97); }
  .btn.sec {
    background: rgba(255, 255, 255, 0.9);
    color: #2a3540;
    border: 0.5px solid rgba(42, 53, 64, 0.15);
  }

  .list {
    text-align: left;
    list-style: none;
    font-size: 14.5px;
    color: #3a4550;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .list li {
    padding: 10px 0;
    border-bottom: 0.5px solid rgba(42, 53, 64, 0.1);
    display: flex;
    gap: 12px;
  }
  .list li:last-child { border: none; }
  .num {
    color: #8590a0;
    font-weight: 500;
    min-width: 18px;
  }

  .diff-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 22px; }
  .diff-btn {
    flex: 1;
    background: rgba(255, 255, 255, 0.9);
    border: 0.5px solid rgba(42, 53, 64, 0.15);
    color: #2a3540;
    padding: 9px 0;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .diff-btn.active { background: #2a3540; color: #fff; }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    font-size: 13px;
    color: #5a6570;
    margin-bottom: 18px;
  }
  .stats-row b { color: #2a3540; font-weight: 600; }

  #hud {
    position: absolute;
    top: 16px;
    left: 16px;
    right: 96px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    pointer-events: none;
  }
  #hud > * { pointer-events: auto; }

  #status {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    color: #2a3540;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(40, 50, 60, 0.08);
  }

  .icon-btn {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2a3540;
    font-size: 18px;
    box-shadow: 0 2px 8px rgba(40, 50, 60, 0.08);
  }
  .icon-btn:hover { background: rgba(255, 255, 255, 0.95); }

  #global-controls {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 20;
    display: flex;
    gap: 8px;
    pointer-events: auto;
  }

  #flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 15;
  }

  #result { display: none; flex-direction: column; align-items: center; gap: 16px; }
  #result-text {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 24px;
    font-weight: 500;
    color: #2a3540;
    text-align: center;
  }
  #result-meta {
    font-size: 13px;
    color: #5a6570;
    margin-top: -10px;
    text-align: center;
  }

  .btn-row { display: flex; gap: 12px; }
</style>
</head>
<body>

<div id="app">
  <canvas id="canvas"></canvas>

  <div id="flash"></div>

  <div id="global-controls">
    <button class="icon-btn" id="mute-btn" aria-label="Mute">🔊</button>
    <button class="icon-btn" id="night-btn" aria-label="Night mode">☾</button>
  </div>

  <!-- Page 1: Start -->
  <div id="page-start" class="page active">
    <div class="card">
      <h1 class="title">Raindrop Race</h1>
      <p class="tag">That childhood window game — pick a drop, watch it race.</p>
      <div class="stats-row" id="start-stats"></div>
      <button class="btn" data-goto="howto">Start</button>
    </div>
  </div>

  <!-- Page 2: How to Play -->
  <div id="page-howto" class="page">
    <div class="card">
      <h2 class="title" style="font-size: 26px;">How to play</h2>
      <p class="tag" style="margin-bottom: 20px;">Rules of the road.</p>
      <ul class="list">
        <li><span class="num">1</span><span>Tap any drop on the window to claim it as yours.</span></li>
        <li><span class="num">2</span><span>First drop to reach the bottom of the glass wins.</span></li>
        <li><span class="num">3</span><span>Bigger drops absorb smaller ones — including yours.</span></li>
      </ul>
      <div class="diff-row" id="diff-row">
        <button class="diff-btn" data-diff="easy">Easy</button>
        <button class="diff-btn active" data-diff="normal">Normal</button>
        <button class="diff-btn" data-diff="hard">Hard</button>
      </div>
      <button class="btn" data-goto="game">Play</button>
    </div>
  </div>

  <!-- Page 3: Game -->
  <div id="page-game" class="page">
    <div id="hud">
      <button class="icon-btn" data-goto="start" aria-label="Home">←</button>
      <span id="status">Tap a drop to claim it</span>
    </div>
    <div id="result" class="card">
      <div id="result-text"></div>
      <div id="result-meta"></div>
      <div class="btn-row">
        <button class="btn sec" data-goto="start">Home</button>
        <button class="btn" id="again">Race again</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const app = document.getElementById('app');
  const statusEl = document.getElementById('status');
  const resultEl = document.getElementById('result');
  const resultText = document.getElementById('result-text');
  const resultMeta = document.getElementById('result-meta');
  const flashEl = document.getElementById('flash');
  const muteBtn = document.getElementById('mute-btn');
  const nightBtn = document.getElementById('night-btn');
  const startStatsEl = document.getElementById('start-stats');

  let W = 0, H = 0;
  const DPR = window.devicePixelRatio || 1;

  const speckles = [];
  const ambient = [];
  const silhouettes = [];
  const wetLines = [];
  const buildingWindows = [];
  const particles = [];
  let racers = [];

  let playerId = -1;
  let gamePhase = 'picking';
  let currentPage = 'start';
  let raceStartTime = null;
  let elapsedTime = 0;
  let glareT = 0;

  let difficulty = 'normal';
  const DIFFICULTY = {
    easy:   { count: 6,  gravity: 0.85 },
    normal: { count: 9,  gravity: 1 },
    hard:   { count: 13, gravity: 1.18 }
  };

  let winStreak = 0;
  let bestTime = localStorage.getItem('rr_best_time') !== null
    ? parseFloat(localStorage.getItem('rr_best_time'))
    : null;

  let nightMode = false;
  let nightBlend = 0;
  let nextLightning = null;

  const SKY_DAY = [[212, 221, 230], [194, 204, 214], [165, 176, 186], [139, 150, 160]];
  const SKY_NIGHT = [[18, 22, 36], [14, 18, 30], [10, 13, 22], [5, 7, 14]];
  const SKY_STOPS = [0, 0.4, 0.75, 1];

  // ---------- Audio ----------
  const audio = { ctx: null, master: null, saturation: null, satLowpass: null, noiseBuffer2s: null, rainSource: null, crackleTimer: null };
  let muted = false;

  function makeDistortionCurve(k) {
    const n = 8192;
    const curve = new Float32Array(n);
    const norm = Math.tanh(k);
    for (let i = 0; i < n; i++) {
      const x = (i / (n - 1)) * 2 - 1;
      curve[i] = Math.tanh(k * x) / norm;
    }
    return curve;
  }

  function createNoiseBuffer(ctx, duration) {
    const size = Math.max(1, Math.floor(ctx.sampleRate * duration));
    const buffer = ctx.createBuffer(1, size, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
    return buffer;
  }

  function ensureAudio() {
    if (audio.ctx) {
      if (audio.ctx.state === 'suspended') audio.ctx.resume();
      return;
    }
    initAudio();
  }

  function initAudio() {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    audio.ctx = ctx;

    audio.master = ctx.createGain();
    audio.master.gain.value = muted ? 0 : 1;
    audio.master.connect(ctx.destination);

    audio.saturation = ctx.createWaveShaper();
    audio.saturation.curve = makeDistortionCurve(2.5);
    audio.saturation.oversample = '4x';

    audio.satLowpass = ctx.createBiquadFilter();
    audio.satLowpass.type = 'lowpass';
    audio.satLowpass.frequency.value = 4200;

    audio.saturation.connect(audio.satLowpass);
    audio.satLowpass.connect(audio.master);

    audio.noiseBuffer2s = createNoiseBuffer(ctx, 2);

    startRain();
    scheduleCrackle();
  }

  function startRain() {
    const ctx = audio.ctx;
    const src = ctx.createBufferSource();
    src.buffer = audio.noiseBuffer2s;
    src.loop = true;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 1100;
    bp.Q.value = 0.8;
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 1800;
    const g = ctx.createGain();
    g.gain.value = 0.065;
    src.connect(bp); bp.connect(lp); lp.connect(g); g.connect(audio.saturation);
    src.start();
    audio.rainSource = src;
  }

  function scheduleCrackle() {
    const delay = 400 + Math.random() * 1400;
    audio.crackleTimer = setTimeout(() => {
      playCrackle();
      scheduleCrackle();
    }, delay);
  }

  function playCrackle() {
    if (!audio.ctx) return;
    const ctx = audio.ctx;
    const dur = 0.03 + Math.random() * 0.04;
    const buf = createNoiseBuffer(ctx, dur);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 3000 + Math.random() * 2000;
    const g = ctx.createGain();
    const peak = 0.015 + Math.random() * 0.02;
    const t0 = ctx.currentTime;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(peak, t0 + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(hp); hp.connect(g); g.connect(audio.saturation);
    src.start(t0);
    src.stop(t0 + dur + 0.02);
  }

  function playClick() {
    if (!audio.ctx) return;
    const ctx = audio.ctx;
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(420, t0);
    osc.frequency.exponentialRampToValueAtTime(210, t0 + 0.1);
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 1600;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.18, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.1);
    osc.connect(lp); lp.connect(g); g.connect(audio.saturation);
    osc.start(t0);
    osc.stop(t0 + 0.12);
  }

  function playWin() {
    if (!audio.ctx) return;
    const ctx = audio.ctx;
    const t0 = ctx.currentTime;
    const notes = [261.63, 329.63, 392.00];
    notes.forEach((freq, i) => {
      const start = t0 + i * 0.11;
      ['sine', 'triangle'].forEach((type, li) => {
        const osc = ctx.createOscillator();
        osc.type = type;
        osc.frequency.value = freq;
        const lp = ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = 2200;
        const g = ctx.createGain();
        const peak = li === 0 ? 0.14 : 0.08;
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(peak, start + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, start + 0.35);
        osc.connect(lp); lp.connect(g); g.connect(audio.saturation);
        osc.start(start);
        osc.stop(start + 0.4);
      });
    });
  }

  function playLose() {
    if (!audio.ctx) return;
    const ctx = audio.ctx;
    const t0 = ctx.currentTime;
    const notes = [293.66, 196.00];
    notes.forEach((freq, i) => {
      const start = t0 + i * 0.16;
      const osc = ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 1200;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.16, start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, start + 0.4);
      osc.connect(lp); lp.connect(g); g.connect(audio.saturation);
      osc.start(start);
      osc.stop(start + 0.45);
    });
  }

  function playThunder() {
    if (!audio.ctx) return;
    const ctx = audio.ctx;
    const dur = 1.4 + Math.random() * 0.8;
    const buf = createNoiseBuffer(ctx, dur);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    const t0 = ctx.currentTime;
    lp.frequency.setValueAtTime(400, t0);
    lp.frequency.exponentialRampToValueAtTime(60, t0 + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.5, t0 + 0.08);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(lp); lp.connect(g); g.connect(audio.saturation);
    src.start(t0);
    src.stop(t0 + dur + 0.05);
  }

  function toggleMute() {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    if (audio.ctx) {
      const t = audio.ctx.currentTime;
      audio.master.gain.cancelScheduledValues(t);
      audio.master.gain.linearRampToValueAtTime(muted ? 0 : 1, t + 0.15);
    }
  }

  function triggerLightning() {
    flashEl.style.transition = 'none';
    flashEl.style.opacity = '0.85';
    void flashEl.offsetWidth;
    flashEl.style.transition = 'opacity 0.5s ease-out';
    flashEl.style.opacity = '0';
    playThunder();
  }

  function toggleNightMode() {
    nightMode = !nightMode;
    nightBtn.textContent = nightMode ? '☀' : '☾';
    document.body.classList.toggle('night', nightMode);
  }

  // ---------- Scene ----------
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    initScene();
  }

  function initScene() {
    // Tiny mist speckles — the fine wetness that covers everything
    speckles.length = 0;
    const speckleCount = Math.floor((W * H) / 550);
    for (let i = 0; i < speckleCount; i++) {
      speckles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 0.3 + Math.random() * 1.5,
        op: 0.5 + Math.random() * 0.5
      });
    }

    // Small ambient drops — stationary or barely moving
    ambient.length = 0;
    const ambientCount = Math.floor((W * H) / 2400);
    for (let i = 0; i < ambientCount; i++) {
      ambient.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 2 + Math.random() * 4.5,
        wig: Math.random() * Math.PI * 2,
        drift: Math.random() < 0.1
      });
    }

    // Blurred silhouettes for outside world (day/night color pairs)
    silhouettes.length = 0;
    silhouettes.push({ x: 0.05 * W, y: 0.7 * H, rx: 0.32 * W, ry: 0.22 * H, day: [140, 55, 65, 0.32], night: [45, 22, 48, 0.4] });
    silhouettes.push({ x: 0, y: 0.85 * H, rx: W, ry: 0.2 * H, day: [65, 75, 85, 0.4], night: [8, 10, 18, 0.6] });
    silhouettes.push({ x: 0.55 * W, y: 0.35 * H, rx: 0.4 * W, ry: 0.3 * H, day: [85, 100, 120, 0.12], night: [14, 17, 28, 0.22] });

    // Wet vertical streaks
    wetLines.length = 0;
    wetLines.push({ x: 0.68 * W, width: 2.5, alpha: 0.45, startY: 0.15 * H });
    wetLines.push({ x: 0.42 * W, width: 1.8, alpha: 0.3, startY: 0.35 * H });
    wetLines.push({ x: 0.85 * W, width: 2, alpha: 0.35, startY: 0.05 * H });

    // Flickering lit windows on the night skyline
    buildingWindows.length = 0;
    const winCount = Math.floor(W / 40);
    for (let i = 0; i < winCount; i++) {
      buildingWindows.push({
        x: Math.random() * W,
        y: H * (0.82 + Math.random() * 0.15),
        w: 3 + Math.random() * 3,
        h: 4 + Math.random() * 5,
        phase: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 2,
        on: Math.random() < 0.7
      });
    }
  }

  class Racer {
    constructor(x, y, s, id) {
      this.id = id;
      this.x = x;
      this.y = y;
      this.size = s;
      this.vy = 0;
      this.vx = 0;
      this.alive = true;
      this.absorbed = false;
      this.splashed = false;
      this.stuck = 0.3 + Math.random() * 1.8;
      this.wig = Math.random() * Math.PI * 2;
      this.trail = [];
    }
    update(dt, racing) {
      this.wig += dt * 2;
      if (this.stuck > 0) {
        this.stuck -= dt;
        this.vy *= 0.6;
        return;
      }
      const gm = racing ? 1 : 0.5;
      const g = (18 + this.size * 3.5) * gm * DIFFICULTY[difficulty].gravity;
      this.vy += g * dt;
      const mx = (racing ? 45 : 22) + this.size * (racing ? 20 : 9);
      if (this.vy > mx) this.vy = mx;
      this.vx = Math.sin(this.wig) * 5;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      const sp = racing ? 0.007 : 0.025;
      if (this.size < 14 && Math.random() < sp && this.vy > 5) {
        this.stuck = 0.25 + Math.random() * (racing ? 0.5 : 1.5);
      }
      if (this.vy > 3) {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 14) this.trail.shift();
      }
    }
  }

  function spawnRacers() {
    racers = [];
    const n = DIFFICULTY[difficulty].count;
    for (let i = 0; i < n; i++) {
      const s = 7 + Math.random() * 5;
      const x = 30 + (W - 60) * ((i + 0.15 + Math.random() * 0.7) / n);
      const y = 15 + Math.random() * 100;
      racers.push(new Racer(x, y, s, i));
    }
  }

  function tryMerges() {
    for (let i = 0; i < racers.length; i++) {
      if (!racers[i].alive) continue;
      for (let j = i + 1; j < racers.length; j++) {
        if (!racers[j].alive) continue;
        const a = racers[i], b = racers[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < (a.size + b.size) * 0.72) {
          const big = a.size >= b.size ? a : b;
          const sm = a.size >= b.size ? b : a;
          spawnSplash((a.x + b.x) / 2, (a.y + b.y) / 2, 5);
          big.size = Math.sqrt(big.size * big.size + sm.size * sm.size);
          big.vy = Math.max(big.vy, sm.vy) * 1.05;
          sm.alive = false;
          if (sm.id === playerId) sm.absorbed = true;
        }
      }
    }
  }

  // ---------- Particles ----------
  function spawnSplash(x, y, count) {
    const n = count || 6;
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 20 + Math.random() * 60;
      particles.push({
        x, y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - 20,
        r: 1 + Math.random() * 2.5,
        life: 0,
        maxLife: 0.3 + Math.random() * 0.35
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life += dt;
      if (p.life > p.maxLife) { particles.splice(i, 1); continue; }
      p.vy += 90 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const t = 1 - p.life / p.maxLife;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.1, p.r * t), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${0.5 * t})`;
      ctx.fill();
    }
  }

  // ---------- Drawing ----------
  function mixColor(day, night, t) {
    const r = Math.round(day[0] + (night[0] - day[0]) * t);
    const g = Math.round(day[1] + (night[1] - day[1]) * t);
    const b = Math.round(day[2] + (night[2] - day[2]) * t);
    const a = day[3] + (night[3] - day[3]) * t;
    return `rgba(${r}, ${g}, ${b}, ${a.toFixed(3)})`;
  }

  function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    for (let i = 0; i < SKY_STOPS.length; i++) {
      const d = SKY_DAY[i], n = SKY_NIGHT[i];
      const r = Math.round(d[0] + (n[0] - d[0]) * nightBlend);
      const gg = Math.round(d[1] + (n[1] - d[1]) * nightBlend);
      const b = Math.round(d[2] + (n[2] - d[2]) * nightBlend);
      g.addColorStop(SKY_STOPS[i], `rgb(${r}, ${gg}, ${b})`);
    }
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawSilhouettes() {
    for (const s of silhouettes) {
      const color = mixColor(s.day, s.night, nightBlend);
      const g = ctx.createRadialGradient(
        s.x + s.rx / 2, s.y + s.ry / 2, 0,
        s.x + s.rx / 2, s.y + s.ry / 2, Math.max(s.rx, s.ry) / 1.5
      );
      g.addColorStop(0, color);
      g.addColorStop(1, color.replace(/[\d.]+\)$/, '0)'));
      ctx.fillStyle = g;
      ctx.fillRect(s.x, s.y, s.rx, s.ry);
    }
  }

  function drawWindows(t) {
    if (nightBlend <= 0.01) return;
    ctx.save();
    ctx.globalAlpha = nightBlend;
    for (const w of buildingWindows) {
      if (!w.on) continue;
      const flicker = 0.55 + 0.45 * Math.sin(t * w.speed + w.phase);
      ctx.fillStyle = `rgba(255, 200, 110, ${(0.5 * flicker).toFixed(3)})`;
      ctx.fillRect(w.x, w.y, w.w, w.h);
    }
    ctx.restore();
  }

  function drawWetLines() {
    for (const l of wetLines) {
      const g = ctx.createLinearGradient(l.x - l.width, 0, l.x + l.width, 0);
      g.addColorStop(0, 'rgba(255, 255, 255, 0)');
      g.addColorStop(0.5, `rgba(255, 255, 255, ${l.alpha})`);
      g.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = g;
      ctx.fillRect(l.x - l.width, l.startY, l.width * 2, H - l.startY);
    }
  }

  function drawSpeckles() {
    for (const s of speckles) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(50, 60, 70, ${s.op * 0.3})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s.x - s.r * 0.25, s.y - s.r * 0.3, s.r * 0.55, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${s.op * 0.9})`;
      ctx.fill();
    }
  }

  function drawDrop(x, y, s, stretch) {
    // Teardrop shape
    ctx.beginPath();
    ctx.moveTo(x + s, y);
    ctx.arc(x, y, s, 0, Math.PI);
    ctx.quadraticCurveTo(x - s * 0.9, y - s * 0.65 - stretch, x, y - s - stretch);
    ctx.quadraticCurveTo(x + s * 0.9, y - s * 0.65 - stretch, x + s, y);
    ctx.closePath();

    // Fill — subtle darker + inverted light
    const fg = ctx.createLinearGradient(x, y - s, x, y + s);
    fg.addColorStop(0, 'rgba(200, 215, 230, 0.4)');
    fg.addColorStop(0.6, 'rgba(125, 140, 155, 0.32)');
    fg.addColorStop(1, 'rgba(75, 90, 105, 0.42)');
    ctx.fillStyle = fg;
    ctx.fill();

    // Dark rim (surface tension)
    ctx.strokeStyle = 'rgba(30, 40, 50, 0.55)';
    ctx.lineWidth = 0.9;
    ctx.stroke();

    // Bright top-left highlight
    ctx.beginPath();
    ctx.ellipse(x - s * 0.28, y - s * 0.15, s * 0.38, s * 0.22, -Math.PI / 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.72)';
    ctx.fill();

    // Small sparkle
    if (s > 2.5) {
      ctx.beginPath();
      ctx.arc(x - s * 0.38, y - s * 0.32, s * 0.13, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
      ctx.fill();
    }
  }

  function drawAmbient(dt) {
    for (const a of ambient) {
      a.wig += dt * 1.2;
      const dx = a.drift ? Math.sin(a.wig) * 0.15 : 0;
      drawDrop(a.x + dx, a.y, a.size, 0);
    }
  }

  function drawRacer(r, isP) {
    // Wet trail
    if (r.trail.length > 1) {
      for (let i = 1; i < r.trail.length; i++) {
        const p = r.trail[i], prev = r.trail[i - 1];
        const t = i / r.trail.length;
        ctx.beginPath();
        ctx.moveTo(prev.x, prev.y);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = `rgba(255, 255, 255, ${t * 0.4})`;
        ctx.lineWidth = t * r.size * 0.6;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }
    const stretch = Math.min(r.size * 1.5, r.vy * 0.05);
    drawDrop(r.x, r.y, r.size, stretch);
    if (isP) {
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.size + 7, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200, 80, 40, 0.85)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.size + 12, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200, 80, 40, 0.28)';
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  }

  function drawCondensation(dt) {
    glareT += dt;

    // Radial vignette
    const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.75);
    vg.addColorStop(0, 'rgba(0, 0, 0, 0)');
    vg.addColorStop(1, 'rgba(10, 14, 18, 0.35)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    // Slow diagonal glare band
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.rotate(-Math.PI / 8);
    const span = W + H * 2;
    const sweep = ((glareT * 60) % span) - span / 2;
    const band = ctx.createLinearGradient(sweep - 70, 0, sweep + 70, 0);
    band.addColorStop(0, 'rgba(255, 255, 255, 0)');
    band.addColorStop(0.5, 'rgba(255, 255, 255, 0.06)');
    band.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = band;
    ctx.fillRect(-W, -H, W * 2, H * 2);
    ctx.restore();
  }

  // ---------- Game flow ----------
  function updateStatsDisplay() {
    if (!startStatsEl) return;
    startStatsEl.innerHTML = `Best <b>${bestTime !== null ? bestTime.toFixed(1) + 's' : '—'}</b> &nbsp;·&nbsp; Streak <b>${winStreak}</b>`;
  }

  function endGame(text, won) {
    gamePhase = 'ended';
    const elapsed = raceStartTime !== null ? (performance.now() - raceStartTime) / 1000 : null;

    if (won) {
      winStreak++;
      playWin();
      if (elapsed !== null && (bestTime === null || elapsed < bestTime)) {
        bestTime = elapsed;
        localStorage.setItem('rr_best_time', String(bestTime));
      }
    } else {
      winStreak = 0;
      playLose();
    }

    resultText.textContent = text;
    let meta = '';
    if (elapsed !== null) meta += `${elapsed.toFixed(1)}s`;
    meta += (meta ? ' · ' : '') + `Streak ${winStreak}`;
    if (bestTime !== null) meta += ` · Best ${bestTime.toFixed(1)}s`;
    resultMeta.textContent = meta;

    resultEl.style.display = 'flex';
    statusEl.style.display = 'none';
    updateStatsDisplay();
  }

  function startGame() {
    spawnRacers();
    playerId = -1;
    gamePhase = 'picking';
    raceStartTime = null;
    resultEl.style.display = 'none';
    statusEl.style.display = 'block';
    statusEl.textContent = 'Tap a drop to claim it';
  }

  function respawnRacer(r) {
    r.alive = true;
    r.y = -10 - Math.random() * 30;
    r.x = 20 + Math.random() * (W - 40);
    r.vy = 0;
    r.stuck = 0.4 + Math.random() * 2;
    r.trail = [];
    r.size = 7 + Math.random() * 5;
    r.absorbed = false;
    r.splashed = false;
  }

  let lastT = performance.now();
  function loop(t) {
    const dt = Math.min(0.05, (t - lastT) / 1000);
    lastT = t;
    elapsedTime += dt;

    nightBlend += ((nightMode ? 1 : 0) - nightBlend) * Math.min(1, dt * 2.5);

    drawSky();
    drawSilhouettes();
    drawWindows(elapsedTime);
    drawWetLines();
    drawSpeckles();
    drawAmbient(dt);

    if (racers.length === 0) spawnRacers();

    const racing = (currentPage === 'game' && gamePhase === 'racing');

    for (const r of racers) if (r.alive) r.update(dt, racing);
    if (racing) tryMerges();

    for (const r of racers) {
      if (r.alive && !r.splashed && r.y > H - 20) {
        spawnSplash(r.x, H - 14, 7);
        r.splashed = true;
      }
    }

    if (racing) {
      if (playerId >= 0 && gamePhase === 'racing') {
        const p = racers[playerId];
        if (p && p.absorbed) endGame('Your drop got absorbed', false);
      }
      if (gamePhase === 'racing') {
        for (const r of racers) {
          if (r.alive && r.y > H - 20) {
            if (r.id === playerId) endGame('Your drop won', true);
            else endGame('Drop #' + (r.id + 1) + ' reached first', false);
            break;
          }
        }
      }
    } else {
      // Natural cycling on start/howto pages and during picking
      for (const r of racers) {
        if (r.alive && r.y > H + 10) respawnRacer(r);
        if (!r.alive) respawnRacer(r);
      }
    }

    for (const r of racers) if (r.alive) drawRacer(r, r.id === playerId);

    updateParticles(dt);
    drawParticles();

    drawCondensation(dt);

    if (nightMode && nightBlend > 0.6) {
      if (nextLightning === null) nextLightning = elapsedTime + 4 + Math.random() * 6;
      if (elapsedTime > nextLightning) {
        triggerLightning();
        nextLightning = elapsedTime + 6 + Math.random() * 10;
      }
    } else {
      nextLightning = null;
    }

    requestAnimationFrame(loop);
  }

  function goto(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    currentPage = page;
    if (page === 'game') startGame();
    if (page === 'start') updateStatsDisplay();
  }

  document.querySelectorAll('[data-goto]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      ensureAudio();
      playClick();
      goto(el.dataset.goto);
    });
  });

  document.getElementById('again').addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    playClick();
    startGame();
  });

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      ensureAudio();
      playClick();
      difficulty = btn.dataset.diff;
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b === btn));
    });
  });

  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    toggleMute();
  });

  nightBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    playClick();
    toggleNightMode();
  });

  canvas.addEventListener('click', (e) => {
    if (currentPage !== 'game' || gamePhase !== 'picking') return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    let best = -1, bd = 50;
    for (const r of racers) {
      if (!r.alive) continue;
      const dx = r.x - cx, dy = r.y - cy;
      const dd = Math.sqrt(dx * dx + dy * dy);
      if (dd < bd) { bd = dd; best = r.id; }
    }
    if (best >= 0) {
      playerId = best;
      gamePhase = 'racing';
      raceStartTime = performance.now();
      statusEl.textContent = 'Race in progress…';
    }
  });

  canvas.addEventListener('touchstart', (e) => {
    if (currentPage !== 'game' || gamePhase !== 'picking') return;
    if (e.touches.length === 0) return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const cx = touch.clientX - rect.left;
    const cy = touch.clientY - rect.top;
    let best = -1, bd = 60;
    for (const r of racers) {
      if (!r.alive) continue;
      const dx = r.x - cx, dy = r.y - cy;
      const dd = Math.sqrt(dx * dx + dy * dy);
      if (dd < bd) { bd = dd; best = r.id; }
    }
    if (best >= 0) {
      playerId = best;
      gamePhase = 'racing';
      raceStartTime = performance.now();
      statusEl.textContent = 'Race in progress…';
      e.preventDefault();
    }
  }, { passive: false });

  updateStatsDisplay();
  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
